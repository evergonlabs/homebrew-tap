name: Update Formula

on:
  repository_dispatch:
    types: [update-formula]

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Update aiframework formula
        run: |
          VERSION="${{ github.event.client_payload.version }}"
          SHA256="${{ github.event.client_payload.sha256 }}"
          URL="${{ github.event.client_payload.url }}"

          echo "Updating formula to v${VERSION} (sha256: ${SHA256})"

          sed -i "s|url \".*\"|url \"${URL}\"|" Formula/aiframework.rb
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" Formula/aiframework.rb

          cat Formula/aiframework.rb

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/aiframework.rb
          git commit -m "Update aiframework to v${{ github.event.client_payload.version }}"
          git push
